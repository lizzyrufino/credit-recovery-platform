server:
  port: 8081

spring:
  application:
    name: credit-strategy-processor

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: true
    sampling:
      probability: 1.0

app:
  aws:
    region: ${AWS_REGION:us-east-1}
    endpoint-override: ${AWS_ENDPOINT:http://localhost:4566}
    access-key: ${AWS_ACCESS_KEY_ID:test}
    secret-key: ${AWS_SECRET_ACCESS_KEY:test}
  processor:
    strategy-table-name: ${STRATEGY_TABLE_NAME:CreditRecoveryStrategy}
    queue-url: ${CREDIT_PROFILE_QUEUE_URL:http://localhost:4566/000000000000/credit-profile-received}
    polling-enabled: ${PROCESSOR_POLLING_ENABLED:true}
    max-messages: ${PROCESSOR_MAX_MESSAGES:5}
    wait-time-seconds: ${PROCESSOR_WAIT_TIME_SECONDS:10}
    poll-delay-ms: ${PROCESSOR_POLL_DELAY_MS:2000}

resilience4j:
  retry:
    instances:
      dynamodb:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      dynamodb:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

logging:
  level:
    br.com.creditrecovery: INFO
